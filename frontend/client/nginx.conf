# /etc/nginx/conf.d/default.conf
# This file is included by nginx inside the "http" context.

# Handle WebSocket Connection header cleanly
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  server_name _;

  # Static site (React/Vite build output)
  root  /usr/share/nginx/html;
  index index.html;

  # ---- Health endpoint (optional but useful) ----
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---- SPA routing: ensures deep links work ----
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ==========================================================
  # API reverse proxy
  # ==========================================================
  # IMPORTANT:
  # - Set this to the Kubernetes Service that fronts your API.
  # - If your API service is in the SAME namespace, you can also use:
  #     set $api_upstream "http://pi-ai-analyst-api";
  #
  # Using a variable + resolver prevents nginx from crashing on startup
  # if DNS is temporarily unavailable or the service isn't ready yet.
  #
  location /api/ {
    # CoreDNS service in kube-system is typically "kube-dns" on EKS
    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    # >>> CHANGE THIS if your backend service name/namespace differs <<<
    set $api_upstream "http://pi-ai-analyst-api.concept-agent-app.svc.cluster.local:80";

    # If your backend expects requests WITHOUT the /api prefix,
    # keep the trailing slash below:
    #   /api/foo -> /foo
    proxy_pass $api_upstream/;

    # If your backend expects requests WITH the /api prefix,
    # then use this instead (NO trailing slash):
    # proxy_pass $api_upstream;

    proxy_http_version 1.1;

    # WebSockets / streaming support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Forward standard headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (tune as needed)
    proxy_connect_timeout 60s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;

    # Optional: disable proxy buffering for streaming responses
    # proxy_buffering off;
  }

  # Optional: cache static assets aggressively
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    expires 7d;
    access_log off;
    add_header Cache-Control "public, max-age=604800, immutable";
       try_files $uri =404;
  }
}